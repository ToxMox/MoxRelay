# MoxRelay Control API -- AsyncAPI 3.0 contract.
# Hand-authored; this document is the source of truth for the wire protocol.
# Validate with:  npx -y @asyncapi/cli validate MoxRelay/docs/control-api.asyncapi.yaml
asyncapi: 3.0.0
x-apiVersion: 1 # control-protocol version (matches GetVersion.result.apiVersion)

info:
  title: MoxRelay Control API
  version: 1.11.0
  license:
    name: GPL-3.0
    url: https://www.gnu.org/licenses/gpl-3.0.html
  description: |
    Loopback WebSocket + JSON control protocol for a MoxRelay capture instance.

    MoxRelay captures video/audio sources and emits each source as its own Spout
    sender. A running MoxRelay process is one *instance* and **serves its own
    control endpoint** at `ws://127.0.0.1:{port}/control`. All control traffic is
    text frames carrying JSON. The endpoint binds loopback only -- it is a local
    control surface, not a network service. TLS is not used.

    ### Discovery handshake
    Clients discover the instance via the discovery file
    `%APPDATA%/MoxRelay/helper-config.json` (a bare single-instance object):

    ```json
    {"instanceId":"tier-60","port":7341,"version":"0.17.0-m11",
     "fpsTier":60,"spoutPrefix":"MACHINE:Helper_7341",
     "ownerId":"","controlToken":"a3f81c0e7d2b49f6a3f81c0e7d2b49f6",
     "sources":[{"name":"MACHINE:Helper_7341_Desktop"}]}
    ```

    Read `port`, then connect to `ws://127.0.0.1:{port}/control`. Notes on the
    discovery file:
    - `sources[].name` entries are the ACTUAL registered Spout sender names
      (collision-suffixed when needed, e.g. `_2`); bind them verbatim.
    - `controlToken` (string): a per-launch random token the helper generates at
      start. Clients MUST append it as `?token=<controlToken>` to the WebSocket
      upgrade URI (see the `instance` server description). It changes on every
      helper launch -- read it fresh from the file before each connect. Absent
      only against a pre-1.7.0 (token-less) helper.
    - The file is written atomically and rewritten on change (~1 s cadence). The
      `controlToken` is written atomically with `port` (same temp+rename), so a
      reader never sees a port without its matching token.
    - A clean shutdown writes a bare empty object `{}`; a crash leaves stale
      content. The file is a discovery HINT; this control API is the
      authoritative live state. Clients should additionally validate sender
      liveness through Spout itself before trusting a name.
    - The discovery file location can be overridden at launch with
      `--discovery-path <file>` (default: `%APPDATA%/MoxRelay/helper-config.json`).

    As of contract 1.5.2, a `CreateSourceParams.externalId` string (a
    client-supplied stable identifier, opaque to the helper) is stored verbatim
    and echoed back in SourceSummary, so a control client can re-adopt the same
    logical source across restarts. Absent == no echoed externalId (legacy
    behavior).

    As of contract 1.7.0, the WebSocket upgrade is AUTHENTICATED and
    browser-fenced. Two gates run on the upgrade handshake, BEFORE any verb is
    dispatched:
    - TOKEN: the upgrade request-target MUST carry `?token=<controlToken>`
      matching the instance's `controlToken` from helper-config.json
      (the file's `controlToken` field). A missing or wrong token is rejected with
      WS close code 4401 (no connection, no verb). The compare is constant-time.
    - ORIGIN: an upgrade is rejected with WS close code 4403 if it carries a
      browser-style `Origin` header -- an http/https scheme, a non-loopback host,
      or the literal `null`. An upgrade with NO `Origin` header, or with a
      `ws(s)://` loopback self-origin (host `127.0.0.1`, `localhost`, or `::1`),
      is allowed: a browser can never forge such an origin (it always sends its
      page's http/https origin or `null`), so this still fences out every web
      page while admitting native clients. Native WebSocket clients typically send
      no `Origin` header; some native WebSocket libraries send a default
      `ws://127.0.0.1:{port}` origin, which is accepted. The token gate (above)
      applies independently of the Origin check.
    This is a DELIBERATE minor bump for a behaviorally breaking handshake change,
    NOT an oversight: a pre-1.7.0 third-party client that connected with no token
    is now rejected and MUST be updated to read `controlToken` from the discovery
    file and append `?token=` (see "Third-party client impact" below). The token
    is fully automatic (helper-generated, rotates per launch); there is no user
    prompt, flag, or env var. An empty `controlToken` (only on the helper's own
    CSPRNG failure) disables the token gate for that instance (degraded, logged);
    the Origin check still applies.

    ### Third-party client impact (contract 1.7.0, breaking)
    A pre-1.7.0 client that connected with a plain `ws://127.0.0.1:{port}/control`
    URL and no token is REJECTED by a 0.12.0-m8+ helper (close 4401). To work
    against a 1.7.0 helper a client MUST:
    1. read `controlToken` from the discovery file (the same file it already
       reads `port` from);
    2. append `?token=<controlToken>` to every connect URL;
    3. send NO `Origin` header.
    Re-read the file before each fresh connection (the token rotates per launch).
    This breaking handshake behavior is exactly why the version is bumped to
    1.7.0 (minor), not a 1.6.x patch.

    ### Wire framing (apiVersion 1)
    - Request:  `{"id": <int|string>, "method": "<Verb>", "params": {...}}` --
      `id` is client-chosen and echoed verbatim; `params` may be omitted
      (treated as `{}`).
    - Success:  `{"id": <echoed>, "result": {...}}`
    - Error:    `{"id": <echoed>, "error": {"code": <int>, "message": "...", "data": {...}?}}`
    - Server push: `{"event": "<name>", "data": {...}}` -- **no `id` field**.
      Clients demultiplex purely on the absence of `id`. Pushes may interleave
      with replies on the same socket.
    - Method names are PascalCase (`CreateSource`); all field names and event
      names are camelCase.
    - Each request receives exactly one reply (success or error). Requests on
      one connection are processed in order.

    Operations below are described from the SERVER's perspective: a client
    request is an action the server `receive`s and answers via `reply`;
    server-pushed events are `send`.

    ### Error codes
    Protocol errors (negative, fixed):

    | Code | Meaning |
    |-|-|
    | -32700 | Parse error (invalid JSON) |
    | -32600 | Invalid request (missing/invalid `method`) |
    | -32601 | Method not found |
    | -32602 | Invalid params |

    Application errors (positive 1000-range; `error.data` carries
    `{category, sourceId?, filterId?, property?, detail?}`):

    | Code | Name | Meaning |
    |-|-|-|
    | 1001 | SourceNotFound | `sourceId` does not exist on this instance |
    | 1002 | FilterNotFound | `filterId` does not exist on that source |
    | 1003 | SourceTypeUnavailable | unknown/unsupported source `type` |
    | 1004 | FilterTypeUnavailable | unknown `filterType`, or filter kind not applicable to the source |
    | 1005 | DeviceBusy | device open failed (e.g. exclusive device held by another process) |
    | 1006 | InvalidPropertyValue | a settings key/value was rejected |
    | 1007 | NotImplemented | the method exists in the contract but is not available in this build |
    | 1008 | NotReady | mutating request received while the instance is still starting |
    | 1009 | ShuttingDown | request received during instance teardown |
    | 1010 | SourceCreateFailed | the engine failed to create the source |
    | 1011 | BroadcastStateConflict | broadcast state transition could not be applied |
    | 1012 | MediaNotSupported | the source does not support media transport (no media pipeline -- today only `media` sources), or the specific action is unsupported (e.g. seeking media with no known duration) |

    Every verb may also reply with `-32602` on malformed params. `-32601` is
    reserved for genuinely unknown method names; methods defined here but not
    yet implemented return `1007 NotImplemented` instead.

    ### Identity model
    Sources are identified by a server-generated opaque string `sourceId`,
    returned by `CreateSource` and listed by `ListSources`/`GetStatus`. It is
    stable for the source's lifetime within the instance and never reused while
    the instance runs. `displayName` is a human-readable label and is NOT
    unique. The Spout sender name (`senderName`) is a separate, read-only,
    server-owned field: it is resolved by the engine only after the source's
    first transmitted frame and may be collision-suffixed; it is `null` until
    resolved. Clients must bind receivers to `senderName` exactly as returned
    (the `senderNameResolved` event signals availability), never to a name they
    predicted. Filters are identified the same way by `filterId`, scoped to
    their source.

    ### Persistence semantics
    Sources created at runtime via `CreateSource` are EPHEMERAL: they do not
    survive an instance restart, and `RemoveSource` affects only the running
    instance. The same applies to filters and property changes applied at
    runtime. A future contract revision may add an opt-in persistence flag.

    ### Subscriptions, events, reconnect
    Server pushes are opt-in per event name via `Subscribe`; the ack's
    `subscribed` array lists the names NEWLY added to this connection's
    subscription set (already-subscribed, unknown, or unsupported names are
    silently omitted). `Unsubscribe` is symmetric. The
    `instanceShuttingDown` event is the one exception: it is delivered to every
    connected client regardless of subscription. The subscription set is
    per-connection and the server keeps no session across sockets: after a
    reconnect, clients MUST re-issue `GetVersion`, re-`Subscribe`, and
    re-snapshot state via `ListSources` + `GetStatus`. There is no event replay.

    ### Vocabulary
    All verbs, type names, and the primary payload fields are MoxRelay's own
    high-level vocabulary (the friendly source types
    camera/display/window/...). The one deliberate exception is the diagnostic
    `engineId` field on `EnumerateSourceVariants`, which reports the underlying
    libobs capture-engine source id (e.g. `dshow_input`, `monitor_capture`)
    for that type; libobs is a disclosed build dependency. No host-application
    or product names appear on the wire. Source types and filter types are
    closed sets advertised at runtime
    by `GetVersion` capabilities, `ListSourceTypes` (per-type display labels +
    capability flags), and `ListAvailableFilters`; settings keys are
    discovered through the property-descriptor verbs (`ListSourceProperties`,
    `ListFilterProperties`) and are part of this published contract.

defaultContentType: application/json

servers:
  instance:
    host: '127.0.0.1:{port}'
    pathname: /control
    protocol: ws
    description: >-
      The MoxRelay instance. Loopback only; plain WebSocket upgrade (GET), no
      TLS. As of contract 1.7.0 the upgrade is AUTHENTICATED: the request-target
      MUST carry `?token=<controlToken>` matching this instance's per-launch
      `controlToken` from helper-config.json -- e.g.
      `ws://127.0.0.1:7341/control?token=a3f8...`. A missing/wrong token is
      rejected with WS close 4401; an upgrade carrying a browser-style `Origin`
      (http/https scheme, non-loopback host, or `null`) is rejected with WS close
      4403 (browser fence). No `Origin`, or a `ws(s)://`-loopback self-origin, is
      allowed. Send no `Origin` header. The
      `{port}` value is a template: the authoritative port (and token) comes from
      `%APPDATA%/MoxRelay/helper-config.json` -> `port` / `controlToken`.
      Never hard-code a port or token; both rotate.
      (The `?token=` query is documented in prose here rather than as a server
      variable: AsyncAPI 3.0 URL templating with a query parameter trips some
      validators.)
    variables:
      port:
        default: '7341'
        description: >-
          TCP port of THIS instance's control endpoint (illustrative default;
          always resolve via the discovery file).

channels:
  control:
    address: /control
    description: >-
      Single bidirectional control socket per instance. Carries all requests,
      replies, and server-pushed events. Replies echo the request `id`;
      pushes have no `id`.
    bindings:
      ws:
        bindingVersion: 0.1.0
    messages:
      GetVersionRequest: { $ref: '#/components/messages/GetVersionRequest' }
      GetVersionReply: { $ref: '#/components/messages/GetVersionReply' }
      GetStatusRequest: { $ref: '#/components/messages/GetStatusRequest' }
      GetStatusReply: { $ref: '#/components/messages/GetStatusReply' }
      ListSourcesRequest: { $ref: '#/components/messages/ListSourcesRequest' }
      ListSourcesReply: { $ref: '#/components/messages/ListSourcesReply' }
      ListSourceTypesRequest: { $ref: '#/components/messages/ListSourceTypesRequest' }
      ListSourceTypesReply: { $ref: '#/components/messages/ListSourceTypesReply' }
      CreateSourceRequest: { $ref: '#/components/messages/CreateSourceRequest' }
      CreateSourceReply: { $ref: '#/components/messages/CreateSourceReply' }
      RemoveSourceRequest: { $ref: '#/components/messages/RemoveSourceRequest' }
      RemoveSourceReply: { $ref: '#/components/messages/RemoveSourceReply' }
      SetSourcePropertiesRequest: { $ref: '#/components/messages/SetSourcePropertiesRequest' }
      SetSourcePropertiesReply: { $ref: '#/components/messages/SetSourcePropertiesReply' }
      ListSourcePropertiesRequest: { $ref: '#/components/messages/ListSourcePropertiesRequest' }
      ListSourcePropertiesReply: { $ref: '#/components/messages/ListSourcePropertiesReply' }
      EnumerateSourceVariantsRequest: { $ref: '#/components/messages/EnumerateSourceVariantsRequest' }
      EnumerateSourceVariantsReply: { $ref: '#/components/messages/EnumerateSourceVariantsReply' }
      ListAvailableFiltersRequest: { $ref: '#/components/messages/ListAvailableFiltersRequest' }
      ListAvailableFiltersReply: { $ref: '#/components/messages/ListAvailableFiltersReply' }
      AddFilterRequest: { $ref: '#/components/messages/AddFilterRequest' }
      AddFilterReply: { $ref: '#/components/messages/AddFilterReply' }
      RemoveFilterRequest: { $ref: '#/components/messages/RemoveFilterRequest' }
      RemoveFilterReply: { $ref: '#/components/messages/RemoveFilterReply' }
      SetFilterPropertiesRequest: { $ref: '#/components/messages/SetFilterPropertiesRequest' }
      SetFilterPropertiesReply: { $ref: '#/components/messages/SetFilterPropertiesReply' }
      ListFilterPropertiesRequest: { $ref: '#/components/messages/ListFilterPropertiesRequest' }
      ListFilterPropertiesReply: { $ref: '#/components/messages/ListFilterPropertiesReply' }
      ListFiltersRequest: { $ref: '#/components/messages/ListFiltersRequest' }
      ListFiltersReply: { $ref: '#/components/messages/ListFiltersReply' }
      SetFilterEnabledRequest: { $ref: '#/components/messages/SetFilterEnabledRequest' }
      SetFilterEnabledReply: { $ref: '#/components/messages/SetFilterEnabledReply' }
      ReorderFilterRequest: { $ref: '#/components/messages/ReorderFilterRequest' }
      ReorderFilterReply: { $ref: '#/components/messages/ReorderFilterReply' }
      SetFilterNameRequest: { $ref: '#/components/messages/SetFilterNameRequest' }
