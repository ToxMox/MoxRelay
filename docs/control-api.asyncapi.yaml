      SetAudioOutputDeviceRequest: { $ref: '#/components/messages/SetAudioOutputDeviceRequest' }
      SetAudioOutputDeviceReply: { $ref: '#/components/messages/SetAudioOutputDeviceReply' }
      StartBroadcastRequest: { $ref: '#/components/messages/StartBroadcastRequest' }
